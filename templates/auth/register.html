{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <title>Django Auth</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">
    <style>
        body { font-size: 16px; font-family: "Plus Jakarta Sans", sans-serif; }
        h2 { font-size: 30px; font-weight: 600; margin-bottom: 16px; }
        label { font-size: 16px; font-weight: 500; }
        .form-control { font-size: 16px; }
        .btn { font-size: 15px; }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/jquery@3.6.4/dist/jquery.slim.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/popper.js@1.16.1/dist/umd/popper.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.bundle.min.js"></script>
</head>

<body>
    <div class="row justify-content-center">
        <div class="col-sm-6">
            <div class="text-center mb-3">
                <img src="{% static 'slideai.jpeg' %}" alt="SlideAI logo" style="width:46px;height:46px;border-radius:10px;object-fit:cover;" />
            </div>
            <h2 class="text-muted">Register</h2>
            <form method="POST" action="{% url 'register' %}">
                {% csrf_token %}
                <div class="form-group">
                    <label for="{{ form.username.id_for_label }}">Username:</label>
                    <input type="text" name="{{ form.username.name }}" class="form-control"
                        value="{{ form.username.value}}" />
                    {% if form.username.errors %}
                    <span class="text-danger">{{ form.username.errors }}</span>
                    {% endif %}
                </div>


                <div class="form-group">
                    <label for="{{ form.password1.id_for_label}}">Password:</label>
                    <input type="password" name="{{ form.password1.name }}" class="form-control"
                        value="{{ form.password1.value}}" />
                    <span class="text-danger">{{ form.password1.errors }}</span>
                </div>
                <div class="form-group">
                    <label for="{{ form.password2.id_for_label}}">Re-Type Password:</label>
                    <input type="password" name="{{ form.password2.name }}" class="form-control"
                        value="{{ form.password2.value}}" />
                    <span class="text-danger">{{ form.password2.errors }}</span>
                </div>

                <button type="submit" class="btn btn-dark">Submit</button>

                <a href="{% url 'login' %}" class="btn btn-default">Login</a>

            </form>
        </div>
    </div>

</body>

</html>
