{% load static %}
{% load socialaccount %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            min-height: 100vh;
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: #f5f5f5;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .login-wrap {
            width: 100%;
            height: 100vh;
            display: grid;
            grid-template-columns: 60% 40%;
        }

        /* ── Left: full-bleed image panel ── */
        .login-visual {
            position: relative;
            overflow: hidden;
            background: #c8b0d8;
        }

        .login-visual img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: center;
            display: block;
        }

        /* ── Right: white form panel ── */
        .login-panel {
            background: #fff;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: clamp(20px, 4vh, 40px) clamp(20px, 3vw, 40px);
            height: 100vh;
            overflow-y: auto;
        }

        .panel-inner {
            width: 100%;
            max-width: 460px;
            max-height: 100%;
        }

        /* Logo */
        .logo {
            display: flex;
            align-items: center;
            gap: 8px;
            justify-content: center;
            margin-bottom: 40px;
        }

        .logo-icon {
            width: 32px;
            height: 32px;
            border-radius: 8px;
            object-fit: cover;
        }

        .logo-text {
            font-size: 30px;
            font-weight: 700;
            color: #1a1a2e;
            letter-spacing: -0.5px;
        }

        .logo-sub {
            display: block;
            font-size: 14px;
            font-weight: 500;
            color: #888;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            text-align: center;
            margin-top: -6px;
            margin-bottom: 36px;
        }

        /* Heading */
        .login-panel h1 {
            font-size: 30px;
            font-weight: 600;
            color: #1a1a2e;
            text-align: center;
            margin-bottom: 28px;
        }

        /* OAuth buttons */
        .oauth-btn {
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            height: 52px;
            border: 1.5px solid #e0e0e0;
            border-radius: 10px;
            background: #fff;
            font-size: 16px;
            font-weight: 500;
            color: #2d2d2d;
            cursor: pointer;
            transition: border-color 0.2s, box-shadow 0.2s;
            text-decoration: none;
            margin-bottom: 13px;
        }

        .oauth-btn:hover {
            border-color: #bbb;
            box-shadow: 0 2px 8px rgba(0,0,0,0.07);
        }

        .oauth-btn svg, .oauth-btn img {
            width: 18px;
            height: 18px;
            flex-shrink: 0;
        }

        /* Divider */
        .divider {
            display: flex;
            align-items: center;
            gap: 12px;
            margin: 18px 0;
            color: #bbb;
            font-size: 12px;
        }
        .divider::before, .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: #e8e8e8;
        }

        /* Email form */
        .form-group { margin-bottom: 14px; }

        label {
            display: block;
            font-size: 15px;
            font-weight: 500;
            color: #444;
            margin-bottom: 6px;
        }

        input[type="text"], input[type="password"] {
            width: 100%;
            height: 48px;
            border: 1.5px solid #e0e0e0;
            border-radius: 10px;
            padding: 0 14px;
            font-size: 16px;
            color: #1a1a2e;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
            background: #fff;
            font-family: inherit;
        }

        input[type="text"]:focus, input[type="password"]:focus {
            border-color: #9b59b6;
            box-shadow: 0 0 0 3px rgba(155, 89, 182, 0.1);
        }

        .btn-login {
            width: 100%;
            height: 52px;
            border: 0;
            border-radius: 10px;
            background: #1a1a2e;
            color: #fff;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
            font-family: inherit;
            margin-top: 4px;
        }

        .btn-login:hover { background: #2d2d50; }

        /* Footer */
        .meta-links {
            margin-top: 20px;
            text-align: center;
            font-size: 17px;
            color: #888;
        }

        .meta-links a {
            color: #7c3aed;
            font-weight: 600;
            text-decoration: none;
        }

        .meta-links a:hover { text-decoration: underline; }

        .cookies-link {
            display: block;
            text-align: center;
            margin-top: 16px;
            font-size: 13px;
            color: #7c3aed;
            text-decoration: none;
            font-weight: 500;
        }

        .cookies-link:hover { text-decoration: underline; }

        /* Alert */
        .alert {
            margin-bottom: 14px;
            padding: 10px 12px;
            border-radius: 8px;
            font-size: 13px;
        }
        .alert-error {
            background: #ffe7e7;
            color: #8e1a1a;
            border: 1px solid #f4b7b7;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .login-wrap { grid-template-columns: 1fr; }
            .login-visual { min-height: 220px; }
            .login-panel { height: auto; min-height: calc(100vh - 220px); padding: 24px; }
        }
    </style>
</head>
<body>
<section class="login-wrap">

    <!-- Left: image -->
    <div class="login-visual">
        <img src="{% static 'login-bg.jpg' %}" alt="SlidesGo preview" />
    </div>

    <!-- Right: login form -->
    <div class="login-panel">
        <div class="panel-inner">

            <!-- Logo -->
            <div class="logo">
                <img class="logo-icon" src="{% static 'slideai.jpeg' %}" alt="SlideAI logo" />
                <span class="logo-text">SLIDE-AI</span>
            </div>
            <span class="logo-sub">by Lakshay</span>

            <h1 id="authTitle">Log in</h1>

            {% if form.non_field_errors %}
                <div class="alert alert-error">{{ form.non_field_errors }}</div>
            {% endif %}

            <div id="loginActions">
                <!-- Google -->
                <a href="{% provider_login_url 'google' %}" class="oauth-btn">
                    <svg viewBox="0 0 18 18" xmlns="http://www.w3.org/2000/svg">
                        <path d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.716v2.259h2.908c1.702-1.567 2.684-3.875 2.684-6.615z" fill="#4285F4"/>
                        <path d="M9 18c2.43 0 4.467-.806 5.956-2.184l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 0 0 9 18z" fill="#34A853"/>
                        <path d="M3.964 10.706A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.706V4.962H.957A8.996 8.996 0 0 0 0 9c0 1.452.348 2.827.957 4.038l3.007-2.332z" fill="#FBBC05"/>
                        <path d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 0 0 .957 4.962L3.964 7.294C4.672 5.163 6.656 3.58 9 3.58z" fill="#EA4335"/>
                    </svg>
                    Continue with Google
                </a>

                <!-- Email toggle -->
                <a href="#" class="oauth-btn" id="emailToggle" onclick="toggleEmail(event)">
                    <svg viewBox="0 0 18 18" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <rect x="1" y="3" width="16" height="12" rx="2" stroke="#555" stroke-width="1.5"/>
                        <path d="M1 5.5L9 11L17 5.5" stroke="#555" stroke-width="1.5"/>
                    </svg>
                    Continue with email
                </a>
            </div>

            <!-- Email/password form (hidden by default) -->
            <div id="emailForm" style="display:none; margin-top:6px;">
                <form method="POST" action="{% url 'login' %}">
                    {% csrf_token %}
                    <div class="form-group">
                        <label for="id_username">Username</label>
                        <input type="text" id="id_username" name="username" required />
                    </div>
                    <div class="form-group">
                        <label for="id_password">Password</label>
                        <input type="password" id="id_password" name="password" required />
                    </div>
                    <button type="submit" class="btn-login">Log in</button>
                </form>
            </div>

            <!-- Register form (shown inline) -->
            <div id="registerForm" style="display:none; margin-top:6px;">
                <form method="POST" action="{% url 'register' %}">
                    {% csrf_token %}
                    <div class="form-group">
                        <label for="reg_username">Email / Username</label>
                        <input type="text" id="reg_username" name="username" required />
                    </div>
                    <div class="form-group">
                        <label for="reg_password1">Password</label>
                        <input type="password" id="reg_password1" name="password1" required />
                    </div>
                    <div class="form-group">
                        <label for="reg_password2">Re-type Password</label>
                        <input type="password" id="reg_password2" name="password2" required />
                    </div>
                    <button type="submit" class="btn-login">Sign up</button>
                </form>
                <div class="meta-links" style="margin-top:14px;font-size:17px;">
                    Already have an account? <a href="#" onclick="showLogin(event)">Log in</a>
                </div>
            </div>

            <div class="meta-links" id="loginMetaLinks">
                Don't you have an account? <a href="#" onclick="showRegister(event)">Sign up</a>
            </div>

        </div>
    </div>

</section>

<script>
    function toggleEmail(e) {
        e.preventDefault();
        const form = document.getElementById('emailForm');
        const registerForm = document.getElementById('registerForm');
        const actions = document.getElementById('loginActions');
        const title = document.getElementById('authTitle');
        registerForm.style.display = 'none';
        actions.style.display = 'block';
        title.textContent = 'Log in';
        form.style.display = form.style.display === 'none' ? 'block' : 'none';
    }

    function showRegister(e) {
        e.preventDefault();
        document.getElementById('registerForm').style.display = 'block';
        document.getElementById('emailForm').style.display = 'none';
        document.getElementById('loginActions').style.display = 'none';
        document.getElementById('loginMetaLinks').style.display = 'none';
        document.getElementById('authTitle').textContent = 'Create an account';
    }

    function showLogin(e) {
        e.preventDefault();
        document.getElementById('registerForm').style.display = 'none';
        document.getElementById('emailForm').style.display = 'none';
        document.getElementById('loginActions').style.display = 'block';
        document.getElementById('loginMetaLinks').style.display = 'block';
        document.getElementById('authTitle').textContent = 'Log in';
    }
</script>
</body>
</html>
