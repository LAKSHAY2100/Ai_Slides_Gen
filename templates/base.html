{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}AI Slides{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        ink: "#09090f",
                        midnight: "#0f0c29",
                        iris: "#4f46e5",
                        cyan: "#06b6d4",
                        steel: "#a6adc8"
                    },
                    fontFamily: {
                        display: ["Plus Jakarta Sans", "sans-serif"],
                        body: ["Plus Jakarta Sans", "sans-serif"]
                    },
                    boxShadow: {
                        glow: "0 0 0 1px rgba(255,255,255,0.08), 0 20px 80px rgba(79,70,229,0.25)"
                    }
                }
            }
        };
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            color-scheme: dark;
        }
        html, body {
            margin: 0;
            padding: 0;
            min-height: 100%;
            background: radial-gradient(circle at 15% 20%, rgba(99, 102, 241, 0.2), transparent 40%),
                        radial-gradient(circle at 85% 70%, rgba(6, 182, 212, 0.16), transparent 45%),
                        #09090f;
            font-family: "Plus Jakarta Sans", sans-serif;
            color: #eef2ff;
        }
        .noise-bg::before {
            content: "";
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: -1;
            opacity: 0.14;
            background-image: radial-gradient(circle, rgba(255,255,255,0.16) 1px, transparent 1px);
            background-size: 3px 3px;
            mix-blend-mode: soft-light;
        }
    </style>
    {% block head_extra %}{% endblock %}
</head>
<body class="noise-bg antialiased">
    {% block content %}{% endblock %}
    {% block scripts %}{% endblock %}
</body>
</html>
